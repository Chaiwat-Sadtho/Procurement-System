name: CI

on:
  push:
    branches: [master, dev]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: procurement_user
          POSTGRES_PASSWORD: procurement_pass
          POSTGRES_DB: procurement_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U procurement_user -d procurement_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: procurement_user
      DB_PASSWORD: procurement_pass
      DB_NAME: procurement_test_db
      JWT_SECRET: ci-test-secret-key-min-32-characters-long
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run test:e2e
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
