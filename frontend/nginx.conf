server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # proxy ทุก request ที่ขึ้นต้น /api ไป backend container
    # axios baseURL = /api/v1 → request เป็น /api/v1/... → ส่งต่อ backend ครบ path (backend prefix = api/v1)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — route ฝั่ง client (React Router) ให้ index.html รับ
    location / {
        try_files $uri $uri/ /index.html;
    }
}
