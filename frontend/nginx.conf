upstream backend_pool {
    server backend1:3000 max_fails=3 fail_timeout=10s;
    server backend2:3000 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # proxy ทุก request /api ไป backend pool (round-robin ข้าม backend1/backend2)
    # round-robin = nginx default; ปลอดภัยเพราะ service stateless (JWT + counter/cache อยู่ Redis)
    location /api/ {
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # transparent failover: backend ตัวหนึ่ง down/error → retry อีกตัวทันที (client ไม่เห็น error)
        # connect timeout สั้นกัน hang ตอน instance หาย; next_upstream retry สูงสุด 2 ตัว (= ขนาด pool) ใน 5s
        # ปลอดภัยกับ mutation: ไม่ใส่ non_idempotent → nginx (1.9.13+) ไม่ retry POST/LOCK/PATCH
        # ที่ส่งถึง backend แล้ว (กัน double-execute เช่น GRN/PO/approve); retry เฉพาะ idempotent (GET) + connect error
        # read-timeout ตอน backend hang กลางคันยังใช้ default 60s (failover เร็วเฉพาะ connect/down — พอสำหรับ demo)
        proxy_connect_timeout 2s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 5s;
    }

    # WebSocket (socket.io) → backend pool. WS-only transport (client) means a single
    # upgrade request per connection, so round-robin is fine — no sticky sessions needed;
    # cross-instance delivery is handled by the socket.io Redis adapter.
    location /socket.io/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — route ฝั่ง client (React Router) ให้ index.html รับ
    location / {
        try_files $uri $uri/ /index.html;
    }
}
